name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --co -q 2>&1 | tail -1
          python -m pytest tests/ -v --tb=short --cov=guardmywire --cov-report=term-missing

      - name: Verify test count
        run: |
          count=$(python -m pytest tests/ --co -q 2>&1 | tail -1 | grep -oP '^\d+')
          echo "Test count: $count"
          if [ "$count" -lt 1750 ]; then
            echo "ERROR: Expected at least 1750 tests, got $count"
            exit 1
          fi
